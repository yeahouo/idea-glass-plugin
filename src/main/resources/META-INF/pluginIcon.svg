<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <!-- Radial gradient from eye center, fading to transparent -->
    <radialGradient id="hazeGrad" cx="50%" cy="47.5%" r="50%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.25" />
      <stop offset="40%" style="stop-color:#0099cc;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Subtle haze background emanating from eye -->
  <circle cx="20" cy="19" r="20" fill="url(#hazeGrad)"/>

  <!-- Equilateral inverted triangle -->
  <path d="M20 34 L8 13 L32 13 Z"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Minimalist eye at center -->
  <ellipse cx="20" cy="19" rx="4" ry="2.5" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="20" cy="19" r="1.2" fill="#FFFFFF"/>
</svg>
